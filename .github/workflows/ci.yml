name: CI

# Build the app and smoke-test the engine on Windows, macOS, and Linux.
# On a version tag (v*), the build job also assembles a DRAFT GitHub release
# with each OS's installer attached, ready for a human to review and publish.
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

# Only the latest run per ref needs to finish; cancel superseded ones.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- Engine: run the full pipeline in mock mode (no GPU, no network) -------
  smoke:
    name: Engine smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync engine deps
        working-directory: engine
        run: uv sync --no-dev

      - name: Mock compose end to end
        working-directory: engine
        shell: bash
        env:
          CADENCE_MOCK: '1'
          CADENCE_PORT: '8000'
          # CADENCE_DATA_DIR only applies to the frozen sidecar; running from
          # source honours CADENCE_DB_PATH, so isolate the DB with that.
          CADENCE_DB_PATH: ${{ runner.temp }}/cadence.db
        run: |
          # No `set -e`: failures are handled explicitly by fail(), which also
          # surfaces the engine log to the run summary (viewable without login).
          set -uo pipefail
          log="${RUNNER_TEMP}/engine.log"
          uv run python run_engine.py >"$log" 2>&1 &
          pid=$!
          trap 'kill $pid 2>/dev/null || true' EXIT

          fail() {
            echo "SMOKE FAILED: $1"
            {
              echo "### Engine smoke failed on ${{ matrix.os }}"
              echo "$1"
              echo ''
              echo '```'
              tail -n 60 "$log" 2>/dev/null || echo "(no engine log)"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          }

          # Wait for the engine to answer, bailing early if it crashed.
          up=""
          for _ in $(seq 1 60); do
            curl -sf http://127.0.0.1:8000/health >/dev/null 2>&1 && { up=1; break; }
            kill -0 "$pid" 2>/dev/null || fail "engine process exited during startup"
            sleep 1
          done
          [ -n "$up" ] || fail "engine did not answer /health within 60s"

          # FastAPI emits compact JSON, so grep/sed on it — no jq dependency.
          health=$(curl -sf http://127.0.0.1:8000/health) || fail "/health request failed"
          echo "health: $health"
          echo "$health" | grep -q '"status":"ok"' || fail "unexpected /health"
          echo "$health" | grep -q '"mock":true'    || fail "engine not in mock mode"

          curl -sf http://127.0.0.1:8000/system >/dev/null || fail "/system failed"

          job=$(curl -sf -X POST http://127.0.0.1:8000/compose \
                 -H 'Content-Type: application/json' \
                 -d '{"prompt":"a calm ci test","instrumental":true,"duration":15}' \
                 | sed -n 's/.*"job_id":"\([^"]*\)".*/\1/p')
          [ -n "$job" ] || fail "no job_id from /compose"
          echo "job=$job"

          st=""
          for _ in $(seq 1 90); do
            st=$(curl -sf "http://127.0.0.1:8000/status/$job" | sed -n 's/.*"status":"\([^"]*\)".*/\1/p')
            echo "status=$st"
            [ "$st" = done ] && break
            [ "$st" = error ] && fail "compose job reported error"
            sleep 1
          done
          [ "$st" = done ] || fail "compose did not finish (last status: ${st:-none})"

          curl -sf http://127.0.0.1:8000/tracks | grep -q '"liked"' || fail "track missing liked field"
          echo "smoke OK on ${{ matrix.os }}"

  # --- App: build the Tauri bundle (+ draft release on a tag) ----------------
  build:
    name: Build ${{ matrix.os }}
    permissions:
      contents: write   # create/upload the draft release on a tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            bundles: deb
          - os: macos-latest
            bundles: dmg
          - os: windows-latest
            bundles: msi
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev patchelf build-essential curl wget file

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install frontend deps
        working-directory: app
        run: npm ci

      - name: Build engine sidecar
        shell: bash
        run: bash scripts/build-sidecar.sh

      - name: Build app
        working-directory: app
        shell: bash
        run: |
          set -o pipefail
          npm run tauri build -- --bundles ${{ matrix.bundles }} 2>&1 \
            | tee "${RUNNER_TEMP}/tauri-build.log"

      - name: Build diagnostics on failure
        if: failure()
        shell: bash
        run: |
          {
            echo "### Build failed on ${{ matrix.os }}"
            echo '```'
            tail -n 120 "${RUNNER_TEMP}/tauri-build.log" 2>/dev/null || echo "(no build log)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: List produced bundles
        if: always()
        shell: bash
        run: ls -R app/src-tauri/target/release/bundle 2>/dev/null || echo "(no bundle dir)"

      - name: Draft release on tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: true
          name: Cadence ${{ github.ref_name }}
          files: |
            app/src-tauri/target/release/bundle/**/*.msi
            app/src-tauri/target/release/bundle/**/*.deb
            app/src-tauri/target/release/bundle/**/*.dmg
